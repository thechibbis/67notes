services:
  minio-init:
    image: alpine:3
    volumes: [license:/license]
    environment:
      MINIO_LICENSE_TOKEN: ${MINIO_LICENSE_TOKEN:-}
    command: sh -c 'printf "%s" "$$MINIO_LICENSE_TOKEN" > /license/minio.license'
    restart: "no"

  minio:
    image: quay.io/minio/aistor/minio:latest
    command: server /mnt/data --console-address ":9001" --license /license/minio.license
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_USER:-minioadmin}
    volumes:
      - minio-data:/mnt/data
      - license:/license:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    image: 67notes:latest
    ports:
      - "6767:6767"
    environment:
      ADDR: ":6767"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      NOTES_BUCKET: "notes"
      IMAGES_BUCKET: "notes-images"
      MINIO_SSL: "false"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6767/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  minio-data:
  license:
